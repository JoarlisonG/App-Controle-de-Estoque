<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Joarlison | Multi-Negócios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b1120;
            color: #f1f5f9;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Financeiro */
        .resumo-financeiro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-financeiro {
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #334155;
            text-align: center;
        }

        .card-financeiro .label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .card-financeiro .valor { font-size: 1.2rem; font-weight: 800; }

        /* Formulário */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 18px;
            border-radius: 22px;
            margin-bottom: 25px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; font-weight: 700; color: #64748b; padding-left: 5px; text-transform: uppercase; }
        
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-add {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Lista de Itens */
        .produto-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .info h3 { font-size: 1rem; color: #fff; margin-bottom: 4px; }
        .info p { font-size: 0.75rem; color: #94a3b8; }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .btn-venda {
            background: #facc15;
            color: #000;
            border: none;
            width: 70px;
            height: 55px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-venda:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        /* Modal de Confirmação Customizado */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal {
            background: #1e293b; padding: 25px; border-radius: 24px; text-align: center;
            max-width: 320px; border: 1px solid #334155;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: #475569; color: white; }
        .btn-confirm { background: #ef4444; color: white; }

        .show { display: flex; }

        .footer-btns { display: flex; justify-content: center; margin-top: 10px; }
        .btn-reset { background: none; border: none; color: #475569; font-size: 0.7rem; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle Joarlison</h1>

    <div class="resumo-financeiro">
        <div class="card-financeiro">
            <div class="label">Caixa (Vendas)</div>
            <div class="valor" id="faturamentoReal" style="color: #facc15;">R$ 0,00</div>
        </div>
        <div class="card-financeiro">
            <div class="label">Lucro Real</div>
            <div class="valor" id="lucroReal" style="color: #4ade80;">R$ 0,00</div>
        </div>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>Modelo de Negócio</label>
            <select id="tipo" onchange="toggleForm()">
                <option value="producao">Produção (Dindin, Bolo...)</option>
                <option value="revenda">Revenda / Brique (PS2, iPhone...)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Nome do Produto / Item</label>
            <input type="text" id="nome" placeholder="Ex: Playstation 2">
        </div>
        <div class="row">
            <div class="input-group">
                <label id="labelCusto">Custo Total</label>
                <input type="number" id="custo" placeholder="0.00">
            </div>
            <div class="input-group" id="groupQtd">
                <label>Quantidade</label>
                <input type="number" id="qtd" placeholder="1">
            </div>
        </div>
        <div class="input-group">
            <label>Preço de Venda (Unid.)</label>
            <input type="number" id="venda" placeholder="0.00">
        </div>
        <button class="btn-add" onclick="adicionar()">Cadastrar no Estoque</button>
    </div>

    <div id="listaProdutos"></div>

    <div class="footer-btns">
        <button onclick="confirmarReset()" class="btn-reset">Zerar Faturamento do Dia</button>
    </div>
</div>

<div class="modal-overlay" id="modalConfirm">
    <div class="modal">
        <h3 id="modalTitle">Confirmar?</h3>
        <p id="modalMsg" style="margin-top: 10px; color: #94a3b8; font-size: 0.9rem;"></p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
            <button class="btn-confirm" id="btnConfirmAction">Sim, Zerar</button>
        </div>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('estoque_v6')) || [];
    let faturamento = parseFloat(localStorage.getItem('fatur_v6')) || 0;
    let custoVendido = parseFloat(localStorage.getItem('custo_v6')) || 0;

    function toggleForm() {
        const t = document.getElementById('tipo').value;
        const groupQtd = document.getElementById('groupQtd');
        const labelCusto = document.getElementById('labelCusto');
        
        if (t === 'revenda') {
            labelCusto.innerText = "Preço de Compra";
            groupQtd.style.opacity = "0.3"; // Indica que geralmente é 1, mas deixa editar
            document.getElementById('qtd').value = 1;
        } else {
            labelCusto.innerText = "Gasto na Produção";
            groupQtd.style.opacity = "1";
        }
    }

    function adicionar() {
        const tipo = document.getElementById('tipo').value;
        const nome = document.getElementById('nome').value.trim();
        const custoB = parseFloat(document.getElementById('custo').value);
        const qtd = parseInt(document.getElementById('qtd').value);
        const venda = parseFloat(document.getElementById('venda').value);

        if(!nome || isNaN(custoB) || isNaN(venda)) return;

        const cUnit = tipo === 'producao' ? (custoB / (qtd || 1)) : (custoB / (qtd || 1));

        produtos.push({
            id: Date.now(),
            tipo,
            nome,
            custoUnit: cUnit,
            vendaUnit: venda,
            qtdEstoque: qtd || 1,
            vendidos: 0
        });

        salvar();
        limpar();
    }

    function vender(id) {
        const p = produtos.find(i => i.id === id);
        if(p.qtdEstoque > 0) {
            p.qtdEstoque--;
            p.vendidos++;
            faturamento += p.vendaUnit;
            custoVendido += p.custoUnit;
            salvar();
        }
    }

    function salvar() {
        localStorage.setItem('estoque_v6', JSON.stringify(produtos));
        localStorage.setItem('fatur_v6', faturamento);
        localStorage.setItem('custo_v6', custoVendido);
        render();
    }

    function render() {
        document.getElementById('faturamentoReal').innerText = `R$ ${faturamento.toFixed(2)}`;
        document.getElementById('lucroReal').innerText = `R$ ${(faturamento - custoVendido).toFixed(2)}`;

        const container = document.getElementById('listaProdutos');
        container.innerHTML = produtos.map(p => `
            <div class="produto-card">
                <div class="info">
                    <span class="badge" style="background: ${p.tipo === 'producao' ? '#c084fc' : '#60a5fa'}; color: #fff">
                        ${p.tipo === 'producao' ? 'PRODUÇÃO' : 'BRIQUE/REVENDA'}
                    </span>
                    <h3>${p.nome}</h3>
                    <p>Venda: R$ ${p.vendaUnit.toFixed(2)} | Vendido: ${p.vendidos}</p>
                    <p style="color: ${p.qtdEstoque === 0 ? '#ef4444' : '#4ade80'}; font-weight: 800; margin-top: 5px;">
                        ${p.qtdEstoque === 0 ? 'ESGOTADO' : '📦 ' + p.qtdEstoque + ' em estoque'}
                    </p>
                    <button onclick="excluir(${p.id})" style="background:none; border:none; color:#475569; font-size:0.6rem; margin-top:8px; cursor:pointer;">Remover Item</button>
                </div>
                <button class="btn-venda" onclick="vender(${p.id})" ${p.qtdEstoque === 0 ? 'disabled' : ''}>
                    ${p.qtdEstoque === 0 ? '---' : 'VENDI<br>+1'}
                </button>
            </div>
        `).join('');
    }

    // FUNÇÕES DO MODAL
    function confirmarReset() {
        const modal = document.getElementById('modalConfirm');
        document.getElementById('modalTitle').innerText = "Zerar Caixa?";
        document.getElementById('modalMsg').innerText = "Isso vai resetar o faturamento e o lucro do dia para R$ 0,00. O estoque continuará igual.";
        modal.classList.add('show');

        document.getElementById('btnConfirmAction').onclick = () => {
            faturamento = 0; custoVendido = 0; salvar();
            fecharModal();
        };
    }

    function fecharModal() { document.getElementById('modalConfirm').classList.remove('show'); }

    function excluir(id) {
        produtos = produtos.filter(p => p.id !== id);
        salvar();
    }

    function limpar() {
        document.getElementById('nome').value = '';
        document.getElementById('custo').value = '';
        document.getElementById('venda').value = '';
        document.getElementById('qtd').value = 1;
    }

    render();
</script>
</body>
</html>
