<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Joarlison | Tema & Gestão</title>
    <style>
        :root {
            /* Tema Escuro (Padrão) */
            --bg-body: #0b1120;
            --bg-container: rgba(30, 41, 59, 0.5);
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            --primary: #22c55e;
            --accent: #facc15;
        }

        [data-theme="light"] {
            /* Tema Claro */
            --bg-body: #f1f5f9;
            --bg-container: #ffffff;
            --bg-card: #f8fafc;
            --bg-input: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        h1 {
            font-size: 1.4rem;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Financeiro */
        .resumo-financeiro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-financeiro {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card-financeiro .label { font-size: 0.6rem; color: var(--text-sub); text-transform: uppercase; margin-bottom: 5px; }
        .card-financeiro .valor { font-size: 1.2rem; font-weight: 800; }

        /* Formulário */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-card);
            padding: 18px;
            border-radius: 22px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); padding-left: 5px; text-transform: uppercase; }
        
        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Lista de Itens */
        .produto-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h3 { font-size: 1rem; color: var(--text-main); margin-bottom: 4px; }
        .info p { font-size: 0.75rem; color: var(--text-sub); }
        
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: #fff;
        }

        .btn-venda {
            background: var(--accent);
            color: #000;
            border: none;
            width: 70px;
            height: 55px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Botão apagar individual */
        .btn-delete-item {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal {
            background: var(--bg-card); padding: 25px; border-radius: 24px; text-align: center;
            max-width: 320px; border: 1px solid var(--border); color: var(--text-main);
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: #475569; color: white; }
        .btn-confirm { background: #ef4444; color: white; }

        .show { display: flex; }
        .btn-reset { background: none; border: none; color: var(--text-sub); font-size: 0.7rem; cursor: pointer; padding: 10px; width: 100%; }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <header>
        <h1>Estoque Pro</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>

    <div class="resumo-financeiro">
        <div class="card-financeiro">
            <div class="label">Caixa Hoje</div>
            <div class="valor" id="faturamentoReal" style="color: var(--accent);">R$ 0,00</div>
        </div>
        <div class="card-financeiro">
            <div class="label">Lucro Real</div>
            <div class="valor" id="lucroReal" style="color: #4ade80;">R$ 0,00</div>
        </div>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>Modelo</label>
            <select id="tipo" onchange="toggleForm()">
                <option value="producao">Produção (Dindin, Bolo...)</option>
                <option value="revenda">Revenda / Brique</option>
            </select>
        </div>
        <div class="input-group">
            <label>Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: iPhone 11">
        </div>
        <div class="row">
            <div class="input-group">
                <label id="labelCusto">Custo Total</label>
                <input type="number" id="custo" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Qtd</label>
                <input type="number" id="qtd" value="1">
            </div>
        </div>
        <div class="input-group">
            <label>Preço Venda (un)</label>
            <input type="number" id="venda" placeholder="0.00">
        </div>
        <button class="btn-add" onclick="adicionar()">Cadastrar Produto</button>
    </div>

    <div id="listaProdutos"></div>

    <button onclick="abrirModalReset()" class="btn-reset">Zerar Caixa do Dia</button>
</div>

<div class="modal-overlay" id="modalConfirm">
    <div class="modal">
        <h3 id="modalTitle">Confirmar?</h3>
        <p id="modalMsg" style="margin-top: 10px; color: var(--text-sub); font-size: 0.9rem;"></p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal()">Voltar</button>
            <button class="btn-confirm" id="btnConfirmAction">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('estoque_v7')) || [];
    let faturamento = parseFloat(localStorage.getItem('fatur_v7')) || 0;
    let custoVendido = parseFloat(localStorage.getItem('custo_v7')) || 0;

    // --- TEMA CLARO/ESCURO ---
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('themeIcon').innerText = newTheme === 'dark' ? '🌙' : '☀️';
        localStorage.setItem('theme_v7', newTheme);
    }

    // Carregar tema salvo
    if(localStorage.getItem('theme_v7') === 'light') toggleTheme();

    function toggleForm() {
        const t = document.getElementById('tipo').value;
        document.getElementById('labelCusto').innerText = t === 'revenda' ? "Preço Compra" : "Gasto Produção";
    }

    function adicionar() {
        const tipo = document.getElementById('tipo').value;
        const nome = document.getElementById('nome').value.trim();
        const custoB = parseFloat(document.getElementById('custo').value);
        const qtd = parseInt(document.getElementById('qtd').value);
        const venda = parseFloat(document.getElementById('venda').value);

        if(!nome || isNaN(custoB) || isNaN(venda)) return;

        const cUnit = custoB / (qtd || 1);

        produtos.push({
            id: Date.now(), tipo, nome, custoUnit: cUnit, 
            vendaUnit: venda, qtdEstoque: qtd || 1, vendidos: 0
        });

        salvar();
        limpar();
    }

    function vender(id) {
        const p = produtos.find(i => i.id === id);
        if(p.qtdEstoque > 0) {
            p.qtdEstoque--;
            p.vendidos++;
            faturamento += p.vendaUnit;
            custoVendido += p.custoUnit;
            salvar();
        }
    }

    // --- EXCLUSÃO INDIVIDUAL COM MODAL ---
    function confirmarExclusao(id) {
        const p = produtos.find(item => item.id === id);
        abrirModal(
            "Apagar Produto?", 
            `Deseja remover "${p.nome}" do estoque permanentemente?`,
            () => {
                produtos = produtos.filter(item => item.id !== id);
                salvar();
            }
        );
    }

    function abrirModalReset() {
        abrirModal(
            "Zerar Caixa?", 
            "Isso resetará o faturamento de hoje. O estoque não será alterado.",
            () => { faturamento = 0; custoVendido = 0; salvar(); }
        );
    }

    function abrirModal(titulo, msg, acao) {
        const modal = document.getElementById('modalConfirm');
        document.getElementById('modalTitle').innerText = titulo;
        document.getElementById('modalMsg').innerText = msg;
        modal.classList.add('show');
        document.getElementById('btnConfirmAction').onclick = () => { acao(); fecharModal(); };
    }

    function fecharModal() { document.getElementById('modalConfirm').classList.remove('show'); }

    function salvar() {
        localStorage.setItem('estoque_v7', JSON.stringify(produtos));
        localStorage.setItem('fatur_v7', faturamento);
        localStorage.setItem('custo_v7', custoVendido);
        render();
    }

    function render() {
        document.getElementById('faturamentoReal').innerText = `R$ ${faturamento.toFixed(2)}`;
        document.getElementById('lucroReal').innerText = `R$ ${(faturamento - custoVendido).toFixed(2)}`;

        const container = document.getElementById('listaProdutos');
        container.innerHTML = produtos.map(p => `
            <div class="produto-card">
                <div class="info">
                    <span class="badge" style="background: ${p.tipo === 'producao' ? '#c084fc' : '#60a5fa'}">
                        ${p.tipo === 'producao' ? 'PRODUÇÃO' : 'REVENDA'}
                    </span>
                    <h3>${p.nome}</h3>
                    <p>Vendido: ${p.vendidos} | Estoque: <b>${p.qtdEstoque}</b></p>
                    <button class="btn-delete-item" onclick="confirmarExclusao(${p.id})">🗑️ Apagar Produto</button>
                </div>
                <button class="btn-venda" onclick="vender(${p.id})" ${p.qtdEstoque === 0 ? 'disabled' : ''}>
                    ${p.qtdEstoque === 0 ? 'FIM' : 'VENDI<br>+1'}
                </button>
            </div>
        `).join('');
    }

    function limpar() {
        document.getElementById('nome').value = '';
        document.getElementById('custo').value = '';
        document.getElementById('venda').value = '';
        document.getElementById('qtd').value = 1;
    }

    render();
</script>
</body>
</html>
