<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Joarlison | UI Refinada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b1120;
            color: #f1f5f9;
            padding: 15px; /* Reduzi um pouco para aproveitar tela no mobile */
            min-height: 100vh;
        }

        .container {
            max-width: 800px; /* Centraliza melhor em telas grandes */
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cards Financeiros mais compactos e elegantes */
        .resumo-financeiro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-financeiro {
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #334155;
            text-align: center;
        }

        .card-financeiro .label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .card-financeiro .valor { font-size: 1.2rem; font-weight: 800; }

        /* Formulário com espaçamento melhorado */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaço entre as linhas do form */
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 22px;
            margin-bottom: 30px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; font-weight: 700; color: #64748b; padding-left: 5px; }
        
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            width: 100%;
        }

        .btn-add {
            background: #22c55e;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 5px;
            cursor: pointer;
        }

        /* TABELA / CARDS MOBILE */
        .lista-produtos { margin-top: 10px; }

        /* Esconder tabela no mobile */
        .tabela-desktop { display: none; }

        /* Estilo dos Cards de Produto (Mobile) */
        .produto-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
        }

        .info-produto h3 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .info-produto p { font-size: 0.8rem; color: #94a3b8; }
        .meta-info { display: flex; gap: 10px; margin-top: 8px; }
        .badge-estoque { background: #0f172a; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; }

        .btn-venda-mobile {
            background: #facc15;
            color: #000;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.2);
        }

        .btn-venda-mobile span { font-size: 1rem; }

        .btn-excluir {
            background: none;
            border: none;
            color: #475569;
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
        }

        /* Desktop: Mostrar tabela e esconder cards */
        @media (min-width: 600px) {
            .tabela-desktop { display: table; width: 100%; border-collapse: collapse; }
            .produto-card { display: none; }
            .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
            .btn-add { grid-column: span 3; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de Estoque</h1>

    <div class="resumo-financeiro">
        <div class="card-financeiro">
            <div class="label">Vendas Realizadas</div>
            <div class="valor" id="faturamentoReal" style="color: #facc15;">R$ 0,00</div>
        </div>
        <div class="card-financeiro">
            <div class="label">Lucro Líquido Real</div>
            <div class="valor" id="lucroReal" style="color: #4ade80;">R$ 0,00</div>
        </div>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>Tipo de Entrada</label>
            <select id="tipo" onchange="toggleModo()">
                <option value="revenda">Revenda</option>
                <option value="producao">Produção</option>
            </select>
        </div>
        <div class="input-group">
            <label>Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: Dindin">
        </div>
        <div class="input-row">
            <div class="input-group">
                <label id="labelCusto">Custo Unit.</label>
                <input type="number" id="custo" placeholder="0.00">
            </div>
            <div class="input-group">
                <label id="labelQtd">Quantidade</label>
                <input type="number" id="qtd" placeholder="0">
            </div>
        </div>
        <div class="input-group">
            <label>Preço de Venda</label>
            <input type="number" id="venda" placeholder="0.00">
        </div>
        <button class="btn-add" onclick="adicionar()">Adicionar Produto</button>
    </div>

    <div id="listaProdutos" class="lista-produtos">
        </div>

    <button onclick="zerarCaixa()" class="btn-excluir">Limpar Faturamento do Dia</button>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('estoque_v5')) || [];
    let faturamento = parseFloat(localStorage.getItem('fatur_v5')) || 0;
    let custoVendido = parseFloat(localStorage.getItem('custo_v5')) || 0;

    function toggleModo() {
        const t = document.getElementById('tipo').value;
        document.getElementById('labelCusto').innerText = t === 'producao' ? "Custo Total" : "Custo Unit.";
        document.getElementById('labelQtd').innerText = t === 'producao' ? "Qtd Produzida" : "Quantidade";
    }

    function adicionar() {
        const tipo = document.getElementById('tipo').value;
        const nome = document.getElementById('nome').value.trim();
        const custoB = parseFloat(document.getElementById('custo').value);
        const qtd = parseInt(document.getElementById('qtd').value);
        const venda = parseFloat(document.getElementById('venda').value);

        if(!nome || isNaN(custoB) || isNaN(qtd)) return;

        const cUnit = tipo === 'producao' ? (custoB / qtd) : custoB;

        produtos.push({
            id: Date.now(),
            nome,
            custoUnit: cUnit,
            vendaUnit: venda,
            qtdEstoque: qtd,
            vendidos: 0
        });

        salvar();
        limpar();
    }

    function vender(id) {
        const p = produtos.find(i => i.id === id);
        if(p.qtdEstoque > 0) {
            p.qtdEstoque--;
            p.vendidos++;
            faturamento += p.vendaUnit;
            custoVendido += p.custoUnit;
            salvar();
        }
    }

    function excluir(id) {
        produtos = produtos.filter(p => p.id !== id);
        salvar();
    }

    function salvar() {
        localStorage.setItem('estoque_v5', JSON.stringify(produtos));
        localStorage.setItem('fatur_v5', faturamento);
        localStorage.setItem('custo_v5', custoVendido);
        render();
    }

    function render() {
        document.getElementById('faturamentoReal').innerText = `R$ ${faturamento.toFixed(2)}`;
        document.getElementById('lucroReal').innerText = `R$ ${(faturamento - custoVendido).toFixed(2)}`;

        const container = document.getElementById('listaProdutos');
        container.innerHTML = produtos.map(p => `
            <div class="produto-card">
                <div class="info-produto">
                    <h3>${p.nome}</h3>
                    <p>Venda: R$ ${p.vendaUnit.toFixed(2)} | Vendido: ${p.vendidos}</p>
                    <div class="meta-info">
                        <span class="badge-estoque" style="color: ${p.qtdEstoque < 3 ? '#f87171' : '#4ade80'}">
                            📦 ${p.qtdEstoque} disponíveis
                        </span>
                    </div>
                    <button onclick="excluir(${p.id})" style="background:none; border:none; color:#475569; font-size:0.6rem; margin-top:10px; text-align:left;">Excluir Produto</button>
                </div>
                <button class="btn-venda-mobile" onclick="vender(${p.id})">
                    <span>+1</span>VENDA
                </button>
            </div>
        `).join('');
    }

    function zerarCaixa() {
        if(confirm("Zerar as vendas do dia?")) {
            faturamento = 0; custoVendido = 0; salvar();
        }
    }

    function limpar() {
        document.getElementById('nome').value = '';
        document.getElementById('custo').value = '';
        document.getElementById('qtd').value = '';
        document.getElementById('venda').value = '';
    }

    render();
</script>
</body>
</html>
