<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Pro | Produção & Revenda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
            color: #f1f5f9;
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        /* Formulário Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: end;
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        button {
            background: linear-gradient(95deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Cards Indicators */
        .resumo-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .card .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
        .card .value { font-size: 1.5rem; font-weight: 800; }
        
        .positivo { color: #4ade80; }
        .negativo { color: #f87171; }

        /* Tabela */
        .tabela-container {
            background: #0f172a;
            border-radius: 20px;
            overflow-x: auto;
            border: 1px solid #334155;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #1e293b; padding: 15px; text-align: left; color: #94a3b8; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
        
        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #334155;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px; width: 90%;
            text-align: center;
            border: 1px solid #334155;
        }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; }
        .btn-cancel { background: #475569; }
        .btn-delete { background: #ef4444; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .show { display: flex; animation: fadeIn 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de Estoque</h1>

    <div class="form-grid">
        <div class="input-group">
            <label>⚙️ Modelo</label>
            <select id="tipoEntrada" onchange="toggleModo()">
                <option value="revenda">Revenda</option>
                <option value="producao">Produção (Eu faço)</option>
            </select>
        </div>
        <div class="input-group">
            <label>📦 Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: Dindin de Coco">
        </div>
        <div class="input-group">
            <label id="labelCusto">💰 Custo Unitário (R$)</label>
            <input type="number" id="custo" step="0.01">
        </div>
        <div class="input-group" id="grupoQtd" style="display: none;">
            <label>🔢 Qtd da Leva</label>
            <input type="number" id="qtdLeva" placeholder="Ex: 50">
        </div>
        <div class="input-group">
            <label>💲 Venda Unitária (R$)</label>
            <input type="number" id="venda" step="0.01">
        </div>
        <button onclick="adicionarProduto()">Adicionar</button>
    </div>

    <div class="resumo-cards">
        <div class="card">
            <div class="label">Total Investido</div>
            <div class="value" id="totalGasto">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="label">Lucro Potencial</div>
            <div class="value" id="totalLucro">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="label">Produtos</div>
            <div class="value" id="countProd">0</div>
        </div>
    </div>

    <div class="tabela-container">
        <table>
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Produto</th>
                    <th>Custo (un)</th>
                    <th>Venda (un)</th>
                    <th>Lucro (un)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalConfirm">
    <div class="modal">
        <h2 style="margin-bottom: 10px;">Excluir item?</h2>
        <p style="color: #94a3b8;">Essa ação não pode ser desfeita.</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-delete" id="btnConfirmDelete">Excluir</button>
        </div>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('estoque_v2')) || [];

    // Alternar campos entre Revenda e Produção
    function toggleModo() {
        const tipo = document.getElementById('tipoEntrada').value;
        const labelCusto = document.getElementById('labelCusto');
        const grupoQtd = document.getElementById('grupoQtd');

        if (tipo === 'producao') {
            labelCusto.innerText = "💰 Custo Total da Leva";
            grupoQtd.style.display = 'flex';
        } else {
            labelCusto.innerText = "💰 Custo Unitário (R$)";
            grupoQtd.style.display = 'none';
        }
    }

    function adicionarProduto() {
        const tipo = document.getElementById('tipoEntrada').value;
        const nome = document.getElementById('nome').value.trim();
        let custoInput = parseFloat(document.getElementById('custo').value);
        const venda = parseFloat(document.getElementById('venda').value);
        const qtdLeva = parseFloat(document.getElementById('qtdLeva').value) || 1;

        if (!nome || isNaN(custoInput) || isNaN(venda)) {
            return alert("Preencha os campos obrigatórios!");
        }

        // Lógica de Produção: Se eu gastei 20 reais para fazer 40 dindins, o custo unitário é 0.50
        let custoUnitario = tipo === 'producao' ? (custoInput / qtdLeva) : custoInput;

        const novoItem = {
            id: Date.now(),
            tipo,
            nome,
            custo: custoUnitario,
            venda: venda
        };

        produtos.push(novoItem);
        salvarERenderizar();
        limparCampos();
    }

    function limparCampos() {
        document.getElementById('nome').value = '';
        document.getElementById('custo').value = '';
        document.getElementById('venda').value = '';
        document.getElementById('qtdLeva').value = '';
        document.getElementById('nome').focus();
    }

    function deletarItem(id) {
        const modal = document.getElementById('modalConfirm');
        modal.classList.add('show');

        document.getElementById('btnConfirmDelete').onclick = () => {
            produtos = produtos.filter(p => p.id !== id);
            salvarERenderizar();
            closeModal();
        };
    }

    function closeModal() {
        document.getElementById('modalConfirm').classList.remove('show');
    }

    function salvarERenderizar() {
        localStorage.setItem('estoque_v2', JSON.stringify(produtos));
        renderTabela();
        renderCards();
    }

    function renderTabela() {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = '';

        produtos.forEach(p => {
            const lucro = p.venda - p.custo;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge" style="color: ${p.tipo === 'producao' ? '#c084fc' : '#60a5fa'}">
                    ${p.tipo === 'producao' ? 'PROD' : 'REV'}
                </span></td>
                <td><strong>${p.nome}</strong></td>
                <td>R$ ${p.custo.toFixed(2)}</td>
                <td>R$ ${p.venda.toFixed(2)}</td>
                <td class="${lucro >= 0 ? 'positivo' : 'negativo'}">R$ ${lucro.toFixed(2)}</td>
                <td><button onclick="deletarItem(${p.id})" style="background:none; color:#ef4444; font-size:1.2rem;">✖</button></td>
            `;
            corpo.appendChild(tr);
        });

        if(produtos.length === 0) {
            corpo.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#64748b;">Nenhum item no estoque</td></tr>';
        }
    }

    function renderCards() {
        const totalInvestido = produtos.reduce((acc, p) => acc + p.custo, 0);
        const totalVenda = produtos.reduce((acc, p) => acc + p.venda, 0);
        const lucroTotal = totalVenda - totalInvestido;

        document.getElementById('totalGasto').innerText = `R$ ${totalInvestido.toFixed(2)}`;
        document.getElementById('totalLucro').innerText = `R$ ${lucroTotal.toFixed(2)}`;
        document.getElementById('totalLucro').className = `value ${lucroTotal >= 0 ? 'positivo' : 'negativo'}`;
        document.getElementById('countProd').innerText = produtos.length;
    }

    // Inicializar
    salvarERenderizar();
</script>

</body>
</html>
