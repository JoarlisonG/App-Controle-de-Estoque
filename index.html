<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Estoque</title>
    <style>
        :root {
            --bg-body: #0b1120;
            --bg-container: rgba(30, 41, 59, 0.5);
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            --primary: #22c55e;
            --accent: #facc15;
            --danger: #ef4444;
        }

        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-container: #ffffff;
            --bg-card: #f8fafc;
            --bg-input: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            padding: 10px;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100vw;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #app-name {
            font-size: 1.1rem;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            transition: opacity 0.5s;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
        }

        .resumo-financeiro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card-financeiro {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 18px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card-financeiro .label { font-size: 0.55rem; color: var(--text-sub); text-transform: uppercase; font-weight: 700; }
        .card-financeiro .valor { font-size: 1rem; font-weight: 800; }

        .search-container input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            color: var(--text-main);
            margin-bottom: 15px;
            outline: none;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .input-group { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        label { font-size: 0.6rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
        
        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.9rem;
            width: 100%;
        }

        .row-inputs { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            width: 100%;
        }
        .row-inputs .input-group { flex: 1 1 140px; }

        .btn-add {
            background: var(--primary);
            color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: 800; cursor: pointer;
            width: 100%;
        }

        .produto-card {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            display: inline-block; padding: 2px 6px; border-radius: 5px; font-size: 0.55rem; font-weight: 800; margin-bottom: 5px; color: #fff;
        }

        .btn-venda {
            background: var(--accent);
            color: #000; border: none; width: 65px; height: 60px; border-radius: 15px; font-weight: 900; font-size: 0.65rem;
        }

        .acoes-card {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-acao {
            background: none; border: none; font-size: 0.7rem; cursor: pointer; color: var(--text-sub); text-decoration: underline;
        }

        /* MODAL PERSONALIZADO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
        }
        .modal {
            background: var(--bg-card); padding: 24px; border-radius: 24px; text-align: center;
            width: 100%; max-width: 320px; border: 1px solid var(--border);
        }
        .show { display: flex; }

        .btn-tool {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sub); 
            padding: 12px; border-radius: 12px; font-size: 0.7rem; width: 100%; margin-top: 8px;
        }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <header>
        <h1 id="app-name">Controle de Estoque 📦</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>

    <div class="resumo-financeiro">
        <div class="card-financeiro">
            <div class="label">Faturamento</div>
            <div class="valor" id="fatReal" style="color: var(--accent);">R$ 0,00</div>
        </div>
        <div class="card-financeiro">
            <div class="label">Lucro Líquido</div>
            <div class="valor" id="lucReal" style="color: var(--primary);">R$ 0,00</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="busca" placeholder="Buscar no estoque..." oninput="render()">
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label>Modelo de Negócio</label>
            <select id="tipo" onchange="toggleForm()">
                <option value="producao">Produção (Eu fabrico)</option>
                <option value="revenda">Revenda (Brique / Compra)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: iPhone, Dindin...">
        </div>
        <div class="row-inputs">
            <div class="input-group">
                <label id="labelCusto">Gasto Produção</label>
                <input type="number" id="custo" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Estoque</label>
                <input type="number" id="qtd" value="1">
            </div>
        </div>
        <div class="input-group">
            <label>Preço de Venda (Un)</label>
            <input type="number" id="venda" placeholder="0.00">
        </div>
        <button class="btn-add" onclick="adicionar()">Cadastrar Agora</button>
    </div>

    <div id="lista"></div>

    <div class="footer-tools">
        <button onclick="exportarCSV()" class="btn-tool">📊 Exportar para Excel (CSV)</button>
        <button onclick="abrirModalReset()" class="btn-tool">🧹 Zerar Caixa do Dia</button>
    </div>
</div>

<div class="modal-overlay" id="modalConfirm">
    <div class="modal">
        <h3 id="modalTitle" style="color: var(--text-main); margin-bottom: 8px;"></h3>
        <div id="modalBody">
            <p id="modalMsg" style="color: var(--text-sub); font-size: 0.85rem; margin-bottom: 20px;"></p>
        </div>
        <div id="modalInputs" style="display: none; flex-direction: column; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="editNome" placeholder="Novo Nome">
            <input type="number" id="editVenda" placeholder="Novo Preço Venda">
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModal()" style="flex:1; padding:12px; border-radius:10px; border:none; background:#475569; color:white;">Sair</button>
            <button id="btnConfirmAction" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--primary); color:white;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('stk_v10')) || [];
    let fat = parseFloat(localStorage.getItem('ft_v10')) || 0;
    let cst = parseFloat(localStorage.getItem('cs_v10')) || 0;

    const titulos = ["Controle de Estoque 📦", "Brique & Produção 💰", "Gestão de Vendas 📈", "Meu Negócio Pro 🚀"];
    let iTit = 0;
    setInterval(() => {
        const el = document.getElementById('app-name');
        if(!el) return;
        el.style.opacity = 0;
        setTimeout(() => {
            iTit = (iTit + 1) % titulos.length;
            el.innerText = titulos[iTit];
            el.style.opacity = 1;
        }, 500);
    }, 4000);

    function toggleTheme() {
        const b = document.body;
        const nt = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', nt);
        document.getElementById('themeIcon').innerText = nt === 'dark' ? '🌙' : '☀️';
        localStorage.setItem('th_v10', nt);
    }
    if(localStorage.getItem('th_v10') === 'light') toggleTheme();

    function toggleForm() {
        const t = document.getElementById('tipo').value;
        document.getElementById('labelCusto').innerText = t === 'revenda' ? "Preço de Compra" : "Gasto Produção";
    }

    function abrirModal(t, m, a, isEdit = false, pObj = null, isAlert = false) {
        const mod = document.getElementById('modalConfirm');
        const btnConf = document.getElementById('btnConfirmAction');
        const msgEl = document.getElementById('modalMsg');
        const inputsEl = document.getElementById('modalInputs');
        
        document.getElementById('modalTitle').innerText = t;
        
        if(isEdit) {
            msgEl.style.display = 'none';
            inputsEl.style.display = 'flex';
            document.getElementById('editNome').value = pObj.nome;
            document.getElementById('editVenda').value = pObj.vendaUnit;
            btnConf.style.display = 'block';
            btnConf.style.background = 'var(--primary)';
        } else if(isAlert) {
            msgEl.style.display = 'block';
            msgEl.innerText = m;
            inputsEl.style.display = 'none';
            btnConf.style.display = 'none'; // Esconde botão confirmar se for só aviso
        } else {
            msgEl.style.display = 'block';
            msgEl.innerText = m;
            inputsEl.style.display = 'none';
            btnConf.style.display = 'block';
            btnConf.style.background = 'var(--danger)';
        }

        mod.classList.add('show');
        btnConf.onclick = () => { a(); fecharModal(); };
    }

    function fecharModal() { document.getElementById('modalConfirm').classList.remove('show'); }

    function adicionar() {
        const n = document.getElementById('nome').value.trim();
        const c = parseFloat(document.getElementById('custo').value);
        const q = parseInt(document.getElementById('qtd').value);
        const v = parseFloat(document.getElementById('venda').value);
        if(!n || isNaN(c) || isNaN(v)) return;
        produtos.push({ id: Date.now(), tipo: document.getElementById('tipo').value, nome: n, custoUnit: c/q, vendaUnit: v, qtdEstoque: q, vendidos: 0 });
        salvar(); limpar();
    }

    function vender(id) {
        const p = produtos.find(i => i.id === id);
        if(p.qtdEstoque > 0) { p.qtdEstoque--; p.vendidos++; fat += p.vendaUnit; cst += p.custoUnit; salvar(); }
    }

    function editarProduto(id) {
        const p = produtos.find(i => i.id === id);
        abrirModal("Editar Produto", "", () => {
            const nn = document.getElementById('editNome').value.trim();
            const np = parseFloat(document.getElementById('editVenda').value);
            if(nn) p.nome = nn;
            if(!isNaN(np)) p.vendaUnit = np;
            salvar();
        }, true, p);
    }

    function confirmarExclusao(id) {
        const p = produtos.find(i => i.id === id);
        abrirModal("Excluir Item?", `Remover ${p.nome}?`, () => {
            produtos = produtos.filter(i => i.id !== id);
            salvar();
        });
    }

    function abrirModalReset() {
        abrirModal("Zerar Caixa?", "Limpar as vendas de hoje?", () => { fat = 0; cst = 0; salvar(); });
    }

    function salvar() {
        localStorage.setItem('stk_v10', JSON.stringify(produtos));
        localStorage.setItem('ft_v10', fat);
        localStorage.setItem('cs_v10', cst);
        render();
    }

    function render() {
        document.getElementById('fatReal').innerText = `R$ ${fat.toFixed(2)}`;
        document.getElementById('lucReal').innerText = `R$ ${(fat - cst).toFixed(2)}`;
        const b = document.getElementById('busca').value.toLowerCase();
        const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(b));
        document.getElementById('lista').innerHTML = filtrados.map(p => `
            <div class="produto-card">
                <div class="info">
                    <span class="badge" style="background:${p.tipo === 'producao' ? '#c084fc' : '#60a5fa'}">${p.tipo.toUpperCase()}</span>
                    <h3>${p.nome}</h3>
                    <p>Preço: R$ ${p.vendaUnit.toFixed(2)} | Vendido: ${p.vendidos}</p>
                    <p style="color: ${p.qtdEstoque < 3 ? 'var(--danger)' : 'var(--text-sub)'}">Estoque: ${p.qtdEstoque}</p>
                    <div class="acoes-card">
                        <button class="btn-acao" onclick="editarProduto(${p.id})">Editar</button>
                        <button class="btn-acao" style="color:var(--danger)" onclick="confirmarExclusao(${p.id})">Apagar</button>
                    </div>
                </div>
                <button class="btn-venda" onclick="vender(${p.id})" ${p.qtdEstoque === 0 ? 'disabled' : ''}>VENDI<br>+1</button>
            </div>
        `).join('');
    }

    function limpar() {
        document.getElementById('nome').value = ''; document.getElementById('custo').value = ''; 
        document.getElementById('venda').value = ''; document.getElementById('qtd').value = 1;
    }

    // CORREÇÃO DO EXPORTAR
    function exportarCSV() {
        if(produtos.length === 0) {
            abrirModal("Atenção", "Cadastre produtos antes de exportar.", null, false, null, true);
            return;
        }
        
        let csv = "Produto;Tipo;Custo Unit;Venda Unit;Estoque;Vendidos\n";
        produtos.forEach(p => {
            csv += `${p.nome};${p.tipo};${p.custoUnit.toFixed(2)};${p.vendaUnit.toFixed(2)};${p.qtdEstoque};${p.vendidos}\n`;
        });

        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.setAttribute("download", "meu_estoque.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    render();
</script>
</body>
</html>
