<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Joarlison Pro | Gestão de Vendas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
            color: #f1f5f9;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            align-items: end;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input:focus { border-color: #22c55e; }

        .btn-add {
            background: linear-gradient(95deg, #22c55e, #16a34a);
            color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* Tabela */
        .tabela-container {
            background: #0f172a;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 12px; text-align: left; color: #94a3b8; font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }

        /* Estilo de Quantidade */
        .qtd-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
        }

        .btn-venda {
            background: #facc15;
            color: #000;
            border: none;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.7rem;
        }

        .btn-venda:hover { background: #eab308; }
        .esgotado { color: #ef4444; font-weight: 700; }

        /* Modal Customizado */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: #1e293b; padding: 25px; border-radius: 20px; text-align: center;
            max-width: 350px; border: 1px solid #334155;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }

        .visible { display: flex; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestão de Estoque & Vendas</h1>

    <div class="form-grid">
        <div class="input-group">
            <label>Tipo</label>
            <select id="tipo" onchange="toggleModo()">
                <option value="revenda">Revenda</option>
                <option value="producao">Produção</option>
            </select>
        </div>
        <div class="input-group">
            <label>Produto</label>
            <input type="text" id="nome" placeholder="Ex: Dindin Morango">
        </div>
        <div class="input-group">
            <label id="labelCusto">Custo Unitário</label>
            <input type="number" id="custo" step="0.01">
        </div>
        <div class="input-group">
            <label id="labelQtd">Qtd no Estoque</label>
            <input type="number" id="qtd" placeholder="Ex: 15">
        </div>
        <div class="input-group">
            <label>Venda Unitária</label>
            <input type="number" id="venda" step="0.01">
        </div>
        <button class="btn-add" onclick="adicionar()">Adicionar</button>
    </div>

    <div class="tabela-container">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Estoque Atual</th>
                    <th>Custo (un)</th>
                    <th>Venda (un)</th>
                    <th>Lucro Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 id="modalTitle">Aviso</h3>
        <p id="modalMsg" style="color: #94a3b8; margin-top: 10px;"></p>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background: #475569; color: white;">Fechar</button>
            <button id="modalConfirmBtn" style="display:none; background: #ef4444; color: white;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('estoque_v3')) || [];

    function toggleModo() {
        const tipo = document.getElementById('tipo').value;
        const labelCusto = document.getElementById('labelCusto');
        const labelQtd = document.getElementById('labelQtd');
        
        if (tipo === 'producao') {
            labelCusto.innerText = "Gasto Total Leva";
            labelQtd.innerText = "Qtd Produzida";
        } else {
            labelCusto.innerText = "Custo Unitário";
            labelQtd.innerText = "Qtd no Estoque";
        }
    }

    function abrirModal(titulo, msg, confirmFunc = null) {
        document.getElementById('modalTitle').innerText = titulo;
        document.getElementById('modalMsg').innerText = msg;
        const btn = document.getElementById('modalConfirmBtn');
        
        if (confirmFunc) {
            btn.style.display = 'block';
            btn.onclick = () => { confirmFunc(); fecharModal(); };
        } else {
            btn.style.display = 'none';
        }
        document.getElementById('modal').classList.add('visible');
    }

    function fecharModal() { document.getElementById('modal').classList.remove('visible'); }

    function adicionar() {
        const tipo = document.getElementById('tipo').value;
        const nome = document.getElementById('nome').value.trim();
        const custoBruto = parseFloat(document.getElementById('custo').value);
        const qtdInicial = parseInt(document.getElementById('qtd').value);
        const vendaUnit = parseFloat(document.getElementById('venda').value);

        if (!nome || isNaN(custoBruto) || isNaN(qtdInicial) || isNaN(vendaUnit)) {
            abrirModal("Erro", "Preencha todos os campos!");
            return;
        }

        const custoUnit = tipo === 'producao' ? (custoBruto / qtdInicial) : custoBruto;

        produtos.push({
            id: Date.now(),
            nome,
            custoUnit,
            vendaUnit,
            qtdEstoque: qtdInicial,
            qtdOriginal: qtdInicial
        });

        atualizar();
        limpar();
    }

    function vender(id) {
        const p = produtos.find(item => item.id === id);
        if (p.qtdEstoque > 0) {
            p.qtdEstoque--;
            atualizar();
        } else {
            abrirModal("Esgotado", `O item ${p.nome} acabou!`);
        }
    }

    function excluir(id) {
        abrirModal("Excluir", "Deseja remover este produto?", () => {
            produtos = produtos.filter(p => p.id !== id);
            atualizar();
        });
    }

    function atualizar() {
        localStorage.setItem('estoque_v3', JSON.stringify(produtos));
        renderTabela();
    }

    function renderTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';

        produtos.forEach(p => {
            const lucroTotalLeva = (p.vendaUnit - p.custoUnit) * p.qtdOriginal;
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td><strong>${p.nome}</strong></td>
                <td>
                    <div class="qtd-badge">
                        <span class="${p.qtdEstoque === 0 ? 'esgotado' : ''}">${p.qtdEstoque} / ${p.qtdOriginal}</span>
                        <button class="btn-venda" onclick="vender(${p.id})">VENDER (-1)</button>
                    </div>
                </td>
                <td>R$ ${p.custoUnit.toFixed(2)}</td>
                <td>R$ ${p.vendaUnit.toFixed(2)}</td>
                <td style="color: #4ade80">R$ ${lucroTotalLeva.toFixed(2)}</td>
                <td><button onclick="excluir(${p.id})" style="background:none; border:none; color:#ef4444; cursor:pointer;">🗑️</button></td>
            `;
            corpo.appendChild(tr);
        });
    }

    function limpar() {
        document.getElementById('nome').value = '';
        document.getElementById('custo').value = '';
        document.getElementById('qtd').value = '';
        document.getElementById('venda').value = '';
    }

    atualizar();
</script>
</body>
</html>
